<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ProcureTEX LinkedIn Banner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0D0720;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    flex-direction: column;
    gap: 24px;
    padding: 40px;
  }

  /* 480×270px display · export at 2.5× = 1200×675px */
  .banner {
    width: 480px;
    height: 270px;
    background: linear-gradient(135deg, #1A0A3C 0%, #6B35E8 100%);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* Lattice pattern */
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(200,255,0,0.12) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 0;
  }

  /* Photo fade overlay */
  .banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #1A0A3C 0%, rgba(26,10,60,0.9) 35%, rgba(26,10,60,0.3) 60%, transparent 100%);
    z-index: 1;
  }

  .photo {
    position: absolute;
    right: 0;
    top: 0;
    width: 55%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    z-index: 0;
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 24px 28px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .logo {
    font-size: 15px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .logo span { color: #C8FF00; }

  .label {
    display: inline-flex;
    align-items: center;
    border: 1px solid rgba(200,255,0,0.3);
    border-radius: 100px;
    padding: 2px 10px;
    font-size: 9px;
    font-weight: 600;
    color: #C8FF00;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    width: fit-content;
  }

  .headline {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1.05;
    max-width: 220px;
    margin-bottom: 6px;
  }

  .sub {
    font-size: 11px;
    font-weight: 500;
    color: #B8A8E8;
    max-width: 200px;
    line-height: 1.4;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #C8FF00;
    border-radius: 100px;
    padding: 0 16px;
    height: 30px;
    font-size: 11px;
    font-weight: 700;
    color: #0D0720;
    white-space: nowrap;
  }

  .event-info {
    font-size: 10px;
    font-weight: 500;
    color: #B8A8E8;
    text-align: right;
    line-height: 1.4;
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LINKEDIN BANNER — 16:9 (480×270 display)
     Replace: headline, subtext, photo src
     ══════════════════════════════════════════ -->
<div class="banner">
  <img class="photo" src="https://via.placeholder.com/264x270/6B35E8/fff?text=Photo" alt="Speaker">

  <div class="content">
    <div class="logo">Procure<span>TEX</span></div>

    <div>
      <div class="label">3 Nov · Amsterdam</div>
      <div class="headline">Headline goes<br>here</div>
      <div class="sub">Supporting context — speaker name, session, or event detail</div>
    </div>

    <div class="footer">
      <div class="cta-btn">Register now →</div>
      <div class="event-info">procuretex.com<br>Circa, Amsterdam</div>
    </div>
  </div>
</div>

</body>
</html>
